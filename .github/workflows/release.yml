name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Resolve semantic version
        id: version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use vMAJOR.MINOR.PATCH (for example v1.0.2)." >&2
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

  # ── Android ──────────────────────────────────────────────
  build-android:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (drift)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build AAB (Play Store)
        run: flutter build appbundle --release --build-name=${{ needs.prepare.outputs.version }} --build-number=${{ github.run_number }}

      - name: Build APK
        run: flutter build apk --release --build-name=${{ needs.prepare.outputs.version }} --build-number=${{ github.run_number }}

      - name: Name Android packages
        run: |
          cp build/app/outputs/bundle/release/app-release.aab build/app/outputs/bundle/release/reverie-${{ needs.prepare.outputs.version }}-android.aab
          cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/reverie-${{ needs.prepare.outputs.version }}-android.apk

      - uses: actions/upload-artifact@v7
        with:
          name: reverie-${{ needs.prepare.outputs.version }}-android-aab
          path: build/app/outputs/bundle/release/reverie-${{ needs.prepare.outputs.version }}-android.aab
          if-no-files-found: error

      - uses: actions/upload-artifact@v7
        with:
          name: reverie-${{ needs.prepare.outputs.version }}-android-apk
          path: build/app/outputs/flutter-apk/reverie-${{ needs.prepare.outputs.version }}-android.apk
          if-no-files-found: error

  # ── iOS ──────────────────────────────────────────────────
  build-ios:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (drift)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS (unsigned)
        run: flutter build ios --release --no-codesign --build-name=${{ needs.prepare.outputs.version }} --build-number=${{ github.run_number }}

      - name: Package unsigned IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -R Runner.app Payload/
          zip -r reverie-${{ needs.prepare.outputs.version }}-ios-unsigned.zip Payload/

      - uses: actions/upload-artifact@v7
        with:
          name: reverie-${{ needs.prepare.outputs.version }}-ios-unsigned
          path: build/ios/iphoneos/reverie-${{ needs.prepare.outputs.version }}-ios-unsigned.zip
          if-no-files-found: error

  # ── macOS ────────────────────────────────────────────────
  build-macos:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (drift)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build macOS
        run: flutter build macos --release --build-name=${{ needs.prepare.outputs.version }} --build-number=${{ github.run_number }}
        env:
          FLUTTER_XCODE_CODE_SIGNING_ALLOWED: 'NO'
          FLUTTER_XCODE_CODE_SIGNING_REQUIRED: 'NO'
          FLUTTER_XCODE_CODE_SIGN_IDENTITY: '-'
          FLUTTER_XCODE_DEVELOPMENT_TEAM: ''

      - name: Package macOS app
        run: |
          cd build/macos/Build/Products/Release
          zip -r reverie-${{ needs.prepare.outputs.version }}-macos.zip Reverie.app

      - uses: actions/upload-artifact@v7
        with:
          name: reverie-${{ needs.prepare.outputs.version }}-macos
          path: build/macos/Build/Products/Release/reverie-${{ needs.prepare.outputs.version }}-macos.zip
          if-no-files-found: error

  # ── Windows ──────────────────────────────────────────────
  build-windows:
    needs: prepare
    # just_audio_windows still relies on the VS 2022 coroutine compatibility
    # layer. Keep this job stable while windows-latest moves to VS 2026.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (drift)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows
        run: flutter build windows --release --build-name=${{ needs.prepare.outputs.version }} --build-number=${{ github.run_number }}

      - name: Package Windows app
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath reverie-${{ needs.prepare.outputs.version }}-windows.zip

      - uses: actions/upload-artifact@v7
        with:
          name: reverie-${{ needs.prepare.outputs.version }}-windows
          path: reverie-${{ needs.prepare.outputs.version }}-windows.zip
          if-no-files-found: error

  # ── Web ──────────────────────────────────────────────────
  build-web:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (drift)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Web
        run: flutter build web --release --base-href /MusicPlayerNext/ --build-name=${{ needs.prepare.outputs.version }} --build-number=${{ github.run_number }}

      - name: Package Web build
        run: cd build && zip -r reverie-${{ needs.prepare.outputs.version }}-web.zip web

      - uses: actions/upload-artifact@v7
        with:
          name: reverie-${{ needs.prepare.outputs.version }}-web
          path: build/reverie-${{ needs.prepare.outputs.version }}-web.zip
          if-no-files-found: error

  # ── GitHub Release ───────────────────────────────────────
  create-release:
    needs:
      - build-android
      - build-ios
      - build-macos
      - build-windows
      - build-web
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Display artifact structure
        run: find artifacts -type f

      - uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: artifacts/**/*
